<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Jirai-Kei Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>
    <script src="https://download.agora.io/sdk/release/agora-rtm-2.2.0.js"></script>
    <style>
        /* 深度注入：地雷系至臻暗黑病娇配色体系 */
        body { background-color: #0d0d0f; -webkit-tap-highlight-color: transparent; color: #f3f4f6; }
        .bg-jirai-blacker { background-color: #0b0b0d; }
        .bg-jirai-dark { background-color: #141418; }
        .bg-jirai-main { background-color: #1a1a22; }
        .bg-jirai-input { background-color: #22222a; }
        
        /* 地雷系招牌：软萌粉与蕾丝紫霓虹高光 */
        .text-jirai-pink { color: #ff80a0; }
        .border-jirai-pink { border-color: #ff80a0; }
        .bg-jirai-pink { background-color: #ff80a0; }
        .shadow-jirai-neon { box-shadow: 0 0 15px rgba(255, 128, 160, 0.4); }

        /* Discord 服务器图标平滑过渡 + 地雷系心形变幻 */
        .server-icon { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid #22222a; }
        .server-icon:hover { border-radius: 14px !important; border-color: #ff80a0 !important; background-color: #ff80a0 !important; box-shadow: 0 0 15px #ff80a0; }
        
        /* 聊天行悬停效果 */
        .chat-row { transition: background-color 0.15s ease; position: relative; }
        .chat-row:hover { background-color: #23232f; }
        .chat-row .msg-actions { display: none; }
        .chat-row:hover .msg-actions { display: flex; }
        
        /* 说话时头像闪烁地雷粉红光圈 */
        .is-speaking { border-color: #ff80a0 !important; box-shadow: 0 0 14px #ff80a0; animation: pulse-pink 1s infinite; }
        @keyframes pulse-pink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        /* 自定义可爱蕾丝滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #141418; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ff80a0; border-radius: 3px; }

        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        .dot-blink { animation: blink 1.4s infinite both; }
        .dot-blink:nth-child(2) { animation-delay: 0.2s; }
        .dot-blink:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="select-none overflow-hidden font-sans antialiased text-sm">

    <script>
        // --- 1. 声网地雷专属 AppID 注入与变量封装 ---
        const APP_ID = "3adf636b90314ac3901887e1560c0db5";
        
        let rtcClient = null;
        let rtmClient = null;
        let isPublishingLock = false; 
        
        let localAudioTrack = null;
        let myInfo = { uid: "", name: "", avatar: "Ares", activeVoiceChannel: null, rtcUid: null, statusText: "🎀 处于混沌状态" };
        let onlineUsers = {}; 
        let activeTextChannel = "chat-lobby"; 
        let isMuted = false;
        let typingTimeout = null;

        const backgrounds = [
            "linear-gradient(135deg, #121216 0%, #1a1a24 100%)",
            "url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=1200')", // 迷幻暗调紫红
            "url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200')"
        ];
        let currentBgIdx = 0;

        // --- 2. 身份契约锁 ---
        let selectedSeed = "Ares";
        document.querySelectorAll('.avatar-option').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.avatar-option').forEach(img => img.classList.remove('border-jirai-pink', 'bg-jirai-main'));
                e.target.classList.add('border-jirai-pink', 'bg-jirai-main');
                selectedSeed = e.target.dataset.avatar;
            });
        });
        document.querySelector('.avatar-option').classList.add('border-jirai-pink', 'bg-jirai-main');

        document.getElementById('btn-enter').addEventListener('click', async () => {
            const name = document.getElementById('username-input').value.trim();
            if(!name) return alert("请赐予契约一个真实的名号！");

            if (typeof AgoraRTC !== "undefined") { AgoraRTC.getDevices(); } // 唤醒苹果端声卡物理锁

            myInfo.uid = "user_" + Math.floor(Math.random() * 899999 + 100000);
            myInfo.name = name;
            myInfo.avatar = selectedSeed;

            document.getElementById('my-name').innerText = name;
            document.getElementById('my-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${selectedSeed}`;
            document.getElementById('login-overlay').classList.add('hidden');

            await initAgoraServices();
            await switchTextChannel("chat-lobby");
        });

        // --- 3. 声网高品质网络连接 ---
        async function initAgoraServices() {
            try {
                rtcClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                
                rtcClient.on("user-published", async (user, mediaType) => {
                    await rtcClient.subscribe(user, mediaType);
                    if (mediaType === "audio") {
                        user.audioTrack.play();
                        updateVoiceUIRender();
                    }
                });
                rtcClient.on("user-unpublished", () => { updateVoiceUIRender(); });

                rtcClient.enableAudioVolumeIndicator();
                rtcClient.on("volume-indicator", volumes => {
                    volumes.forEach(volume => {
                        const card = document.getElementById(`v-card-${volume.uid}`);
                        if (card) {
                            if (volume.level > 4) card.classList.add('is-speaking');
                            else card.classList.remove('is-speaking');
                        }
                    });
                });

                rtmClient = new AgoraRTM.RTM(APP_ID, myInfo.uid);
                await rtmClient.login();

                rtmClient.addEventListener("message", (event) => { handleIncomingRTMEvent(event); });
                rtmClient.addEventListener("presence", (event) => {
                    if (["SNAPSHOT", "JOIN", "LEAVE"].includes(event.eventType)) {
                        refreshOnlineMemberList();
                    }
                });
            } catch (err) {
                console.error("地雷专属专线链路中断:", err);
            }
        }

        // --- 4. 彻底捍卫回车：异步非阻塞高吞吐防卡死架构 ---
        const chatInput = document.getElementById('chat-input');
        
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); 
                e.stopPropagation(); 
                if(isPublishingLock) return;
                executeSendAction();
            }
        });

        async function executeSendAction() {
            const content = chatInput.value.trim();
            if(!content) return; 

            isPublishingLock = true; 
            const msgId = "msg_" + Date.now() + "_" + Math.floor(Math.random()*1000);

            const messagePayload = {
                type: "TEXT",
                msgId: msgId,
                channelId: activeTextChannel,
                senderUid: myInfo.uid,
                senderName: myInfo.name,
                senderAvatar: myInfo.avatar,
                content: content,
                timestamp: Date.now()
            };

            // 安全沙箱机制：本地无论如何先行渲染，杜绝卡死死锁
            renderMessage(messagePayload);
            chatInput.value = ""; 
            chatInput.focus();

            if(rtmClient) {
                try {
                    await rtmClient.publish(activeTextChannel, JSON.stringify(messagePayload));
                } catch (err) {
                    console.warn("通道繁忙，启用本地优先平滑渲染方案", err);
                }
            }
            isPublishingLock = false; 
        }

        chatInput.addEventListener('input', () => {
            if(!rtmClient) return;
            rtmClient.publish(activeTextChannel, JSON.stringify({ type: "TYPING", senderName: myInfo.name, channelId: activeTextChannel })).catch(()=>{});
        });

        // 修改个签/宣言逻辑 (Discord原版还原)
        document.getElementById('user-profile-trigger').addEventListener('click', () => {
            const newStatus = prompt("请输入您今天的新契约宣言/个性签名：", myInfo.statusText);
            if(newStatus !== null) {
                myInfo.statusText = newStatus.trim() || "🎀 保持沉沦";
                document.getElementById('my-status-text').innerText = myInfo.statusText;
                broadcastUserInfo(); // 立刻全服通告
                refreshOnlineMemberList();
            }
        });

        // --- 5. RTM 数据中心分流逻辑 ---
        function handleIncomingRTMEvent(event) {
            try {
                const data = JSON.parse(event.message);
                
                if (data.type === "IDENTITY") {
                    onlineUsers[event.publisher] = {
                        name: data.name,
                        avatar: data.avatar,
                        rtcUid: data.rtcUid,
                        voiceChannel: data.voiceChannel,
                        isMuted: data.isMuted || false,
                        statusText: data.statusText || "🎀 处于未知空间"
                    };
                    updateVoiceUIRender();
                    refreshOnlineMemberList();
                    return;
                }

                if (data.type === "TYPING" && data.channelId === activeTextChannel && event.publisher !== myInfo.uid) {
                    showTypingIndicator(data.senderName);
                    return;
                }

                if (data.type === "DELETE_MSG" && data.channelId === activeTextChannel) {
                    const el = document.getElementById(data.targetMsgId);
                    if(el) el.remove();
                    return;
                }

                if (data.type === "PIN_MSG" && data.channelId === activeTextChannel) {
                    executeLocalPinRender(data.content);
                    return;
                }

                if (data.channelId === activeTextChannel && event.publisher !== myInfo.uid) {
                    renderMessage(data);
                }
            } catch (e) {}
        }

        // --- 6. 像素级高级渲染树（含撤回、置顶Pins设计） ---
        function renderMessage(msg) {
            const container = document.getElementById('chat-messages');
            const isImage = msg.type === "IMAGE";
            const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const isMention = msg.content && msg.content.includes("@everyone");
            const highlightClass = isMention ? "bg-pink-500/10 border-l-2 border-jirai-pink" : "";

            const row = document.createElement('div');
            row.id = msg.msgId || ("local_" + Date.now());
            row.className = `flex items-start space-x-3 text-sm px-4 py-2 chat-row mx-[-16px] ${highlightClass}`;
            
            let contentHTML = isImage 
                ? `<img src="${msg.content}" class="mt-2 max-w-xs max-h-48 rounded-lg border border-neutral-900 object-cover cursor-zoom-in" onclick="window.open('${msg.content}')">`
                : `<p class="text-neutral-300 select-text leading-relaxed break-all">${isMention ? msg.content.replace(/@everyone/g, '<span class="bg-pink-500/30 text-jirai-pink font-bold px-1 rounded">@everyone</span>') : escapeHTML(msg.content)}</p>`;

            // 还原 Discord 复合小挂件（删除桶 + 钉子置顶）
            let actionPill = `
                <div class="msg-actions absolute right-4 top-2 bg-jirai-blacker border border-jirai-pink/20 rounded-lg shadow-lg overflow-hidden flex divide-x divide-neutral-800 text-xs">
                    <button class="px-2 py-1 hover:bg-jirai-pink hover:text-black text-neutral-400" onclick="pinThisMessage('${row.id}')" title="置顶此条消息">📌</button>
                    ${msg.senderUid === myInfo.uid ? `<button class="px-2 py-1 hover:bg-red-600 hover:text-white text-neutral-400" onclick="deleteMyMessage('${row.id}')" title="撤回此信息">🗑️</button>` : ''}
                </div>
            `;

            row.innerHTML = `
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${msg.senderAvatar}" class="w-10 h-10 rounded-full bg-jirai-darker flex-shrink-0 mt-0.5 border border-neutral-800">
                <div class="flex-1 min-w-0">
                    <div class="flex items-baseline space-x-2">
                        <span class="font-semibold text-white group-hover:text-jirai-pink">${escapeHTML(msg.senderName)}</span>
                        <span class="text-[10px] text-neutral-500">${timeStr}</span>
                    </div>
                    ${contentHTML}
                </div>
                ${actionPill}
            `;
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function pinThisMessage(msgId) {
            const row = document.getElementById(msgId);
            if(!row) return;
            const textContent = row.querySelector('p') ? row.querySelector('p').innerText : '[图片附件]';
            
            executeLocalPinRender(textContent);

            if(rtmClient) {
                rtmClient.publish(activeTextChannel, JSON.stringify({ type: "PIN_MSG", channelId: activeTextChannel, content: textContent })).catch(()=>{});
            }
        }

        function executeLocalPinRender(text) {
            const banner = document.getElementById('pinned-banner');
            document.getElementById('pinned-text').innerText = text;
            banner.classList.remove('hidden');
        }

        function deleteMyMessage(msgId) {
            const el = document.getElementById(msgId); if(el) el.remove();
            if(rtmClient) {
                rtmClient.publish(activeTextChannel, JSON.stringify({ type: "DELETE_MSG", channelId: activeTextChannel, targetMsgId: msgId })).catch(()=>{});
            }
        }

        function showTypingIndicator(name) {
            const box = document.getElementById('typing-indicator');
            document.getElementById('typing-text').innerText = name;
            box.classList.remove('hidden'); box.classList.add('flex');
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { box.classList.add('hidden'); }, 2200);
        }

        // --- 7. 通道状态锁切换隔离体系 ---
        async function switchTextChannel(channelId) {
            if(activeTextChannel && rtmClient) {
                try { await rtmClient.unsubscribe(activeTextChannel); } catch(e){}
            }
            activeTextChannel = channelId;
            document.getElementById('chat-messages').innerHTML = "";
            document.getElementById('pinned-banner').classList.add('hidden'); // 切换文字频道时重置Pin
            
            const itemEl = document.querySelector(`[data-channel="${channelId}"]`);
            document.getElementById('room-title').innerHTML = `<span class="text-jirai-pink text-xl mr-1 font-light">#</span> <span>${itemEl ? itemEl.innerText.substring(1).trim() : channelId}</span>`;

            document.getElementById('panel-chat').classList.remove('hidden');
            document.getElementById('panel-voice').classList.add('hidden');

            if(rtmClient) {
                await rtmClient.subscribe(channelId, { withMessage: true, withPresence: true });
                broadcastUserInfo();
                refreshOnlineMemberList();
            }
        }

        async function switchVoiceChannel(channelId) {
            if(myInfo.activeVoiceChannel === channelId) return;
            await leaveCurrentVoiceChannel();

            myInfo.activeVoiceChannel = channelId;
            const itemEl = document.querySelector(`[data-channel="${channelId}"]`);
            document.getElementById('room-title').innerHTML = `<span class="mr-2">🔮</span> <span>${itemEl ? itemEl.innerText.substring(1).trim() : channelId}</span>`;

            document.getElementById('panel-chat').classList.add('hidden');
            document.getElementById('panel-voice').classList.remove('hidden');
            document.getElementById('voice-status-pill').classList.remove('hidden');
            document.getElementById('btn-disconnect-voice').classList.remove('hidden');

            try {
                const numericUid = Math.floor(Math.random() * 8999999 + 1000000);
                myInfo.rtcUid = numericUid;

                await rtcClient.join(APP_ID, channelId, null, numericUid);
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true, AGC: true });
                if(isMuted) await localAudioTrack.setMuted(true);
                await rtcClient.publish(localAudioTrack);
                
                broadcastUserInfo();
                updateVoiceUIRender();
            } catch (err) {
                console.error("RTC调度滑丝 Bug 锁定拦截:", err);
            }
        }

        async function leaveCurrentVoiceChannel() {
            if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); localAudioTrack = null; }
            if (rtcClient) { await rtcClient.leave(); }
            myInfo.activeVoiceChannel = null; myInfo.rtcUid = null;

            document.getElementById('voice-status-pill').classList.add('hidden');
            document.getElementById('btn-disconnect-voice').classList.add('hidden');
            updateVoiceUIRender();
            switchTextChannel("chat-lobby");
        }

        // --- 8. 在线树与卡片总线布局渲染 ---
        async function refreshOnlineMemberList() {
            if(!rtmClient) return;
            try {
                const result = await rtmClient.presence.getOnlineUsers(activeTextChannel);
                const listContainer = document.getElementById('member-list');
                listContainer.innerHTML = "";
                let count = 0;

                // 渲染自己
                appendMemberItem(myInfo.name, myInfo.avatar, myInfo.statusText, true); count++;

                if(result && result.userList) {
                    result.userList.forEach(user => {
                        if(user.userId === myInfo.uid) return;
                        const cached = onlineUsers[user.userId];
                        const name = cached ? cached.name : `契约者_${user.userId.substring(5,9)}`;
                        const avatar = cached ? cached.avatar : "Ares";
                        const status = cached ? cached.statusText : "🎀 正在观测深渊";
                        appendMemberItem(name, avatar, status, false);
                        count++;
                    });
                }
                document.getElementById('member-count').innerText = count;
            } catch (e) {}
        }

        function appendMemberItem(name, avatarSeed, status, isMe) {
            const item = document.createElement('div');
            item.className = "flex flex-col p-1.5 hover:bg-jirai-pink/5 rounded-lg cursor-pointer transition border border-transparent hover:border-jirai-pink/10";
            item.innerHTML = `
                <div class="flex items-center space-x-2">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${avatarSeed}" class="w-7 h-7 rounded-full bg-jirai-blacker">
                    <span class="text-xs text-neutral-300 font-medium truncate flex-1">${escapeHTML(name)} ${isMe ? '<span class="text-[9px] text-jirai-pink font-bold">[本地]</span>':''}</span>
                </div>
                <div class="text-[10px] text-neutral-500 pl-9 truncate leading-none mt-0.5">${escapeHTML(status)}</div>
            `;
            document.getElementById('member-list').appendChild(item);
        }

        function updateVoiceUIRender() {
            const container = document.getElementById('panel-voice');
            if(myInfo.activeVoiceChannel === null) { container.innerHTML = ""; return; }
            container.innerHTML = "";

            appendVoiceCard(myInfo.rtcUid || "local", myInfo.name, myInfo.avatar, isMuted);

            if(rtcClient) {
                rtcClient.remoteUsers.forEach(user => {
                    let name = `迷途回响_${user.uid}`; let avatar = "Ares"; let remoteMuted = false;
                    for (let id in onlineUsers) {
                        if (String(onlineUsers[id].rtcUid) === String(user.uid)) {
                            name = onlineUsers[id].name; avatar = onlineUsers[id].avatar; remoteMuted = onlineUsers[id].isMuted; break;
                        }
                    }
                    appendVoiceCard(user.uid, name, avatar, remoteMuted);
                });
            }
        }

        function appendVoiceCard(rtcUid, name, avatarSeed, mutedState) {
            const container = document.getElementById('panel-voice');
            const card = document.createElement('div'); card.id = `v-card-${rtcUid}`;
            card.className = "bg-jirai-dark rounded-xl flex flex-col items-center justify-center relative aspect-square border-2 border-neutral-800 transition-all duration-300 shadow-lg";
            
            const muteBadgeHTML = mutedState ? `<div class="absolute bottom-2 right-2 bg-pink-600/90 text-white rounded-full p-1 text-[10px] leading-none border border-jirai-pink/30">🔇</div>` : '';

            card.innerHTML = `
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${avatarSeed}" class="w-16 h-16 rounded-full mb-2 bg-jirai-blacker border border-neutral-800">
                <div class="text-xs font-medium text-jirai-pink text-center px-1 truncate w-full">${escapeHTML(name)}</div>
                ${muteBadgeHTML}
            `;
            container.appendChild(card);
        }

        // --- 9. 资产上传与开关绑定组 ---
        document.getElementById('btn-trigger-image').addEventListener('click', () => document.getElementById('image-loader').click());
        document.getElementById('image-loader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || file.size > 150 * 1024) return alert("请维持小图在 150KB 内以防网络过载。");
            const reader = new FileReader();
            reader.onload = function(evt) {
                const messagePayload = { type: "IMAGE", msgId: "msg_"+Date.now(), channelId: activeTextChannel, senderUid: myInfo.uid, senderName: myInfo.name, senderAvatar: myInfo.avatar, content: evt.target.result, timestamp: Date.now() };
                if(rtmClient) rtmClient.publish(activeTextChannel, JSON.stringify(messagePayload)).catch(()=>{});
                renderMessage(messagePayload);
            };
            reader.readAsDataURL(file); this.value = "";
        });

        function broadcastUserInfo() {
            if(!rtmClient) return;
            rtmClient.publish(activeTextChannel, JSON.stringify({ type: "IDENTITY", name: myInfo.name, avatar: myInfo.avatar, rtcUid: myInfo.rtcUid, voiceChannel: myInfo.activeVoiceChannel, isMuted: isMuted, statusText: myInfo.statusText })).catch(()=>{});
        }

        document.getElementById('btn-disconnect-voice').addEventListener('click', () => leaveCurrentVoiceChannel());
        document.getElementById('btn-toggle-mic').addEventListener('click', async () => {
            isMuted = !isMuted; if(localAudioTrack) await localAudioTrack.setMuted(isMuted);
            document.getElementById('btn-toggle-mic').innerText = isMuted ? "🔇" : "🎙️";
            document.getElementById('btn-toggle-mic').classList.toggle('text-pink-400', isMuted);
            broadcastUserInfo(); updateVoiceUIRender();
        });

        document.getElementById('btn-change-bg').addEventListener('click', () => {
            currentBgIdx = (currentBgIdx + 1) % backgrounds.length;
            const root = document.getElementById('app-root');
            root.style.backgroundImage = backgrounds[currentBgIdx].startsWith('url') ? backgrounds[currentBgIdx] : '';
            root.style.background = backgrounds[currentBgIdx].startsWith('linear') ? backgrounds[currentBgIdx] : '';
        });

        document.body.addEventListener('click', (e) => {
            const btn = e.target.closest('.channel-item'); if (!btn) return;
            const type = btn.dataset.type; const target = btn.dataset.channel;
            document.querySelectorAll('.channel-item').forEach(i => {
                i.className = "channel-item flex items-center px-2 py-2 rounded-lg text-gray-400 hover:bg-jirai-main/40 hover:text-gray-200 cursor-pointer text-sm";
            });
            btn.className = "channel-item flex items-center px-2 py-2 rounded-lg text-jirai-pink bg-jirai-pink/10 border border-jirai-pink/20 cursor-pointer text-sm font-medium";
            if (type === 'text') switchTextChannel(target); else if (type === 'voice') switchVoiceChannel(target);
        });

        setInterval(() => { if(rtmClient && myInfo.name) broadcastUserInfo(); }, 5000);
        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
    </script>
</body>
</html>
